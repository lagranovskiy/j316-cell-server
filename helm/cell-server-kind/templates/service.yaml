apiVersion: v1
kind: Service
metadata:
  name: {{ include "cell-server-kind.fullname" . }}
  labels:
    {{- include "cell-server-kind.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "cell-server-kind.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
