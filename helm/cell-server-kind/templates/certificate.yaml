{{- if and .Values.certManager.enabled .Values.ingress.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "cell-server-kind.fullname" . }}
  labels:
    {{- include "cell-server-kind.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tls.secretName }}
  issuerRef:
    name: {{ .Values.certManager.clusterIssuer.name }}
    kind: ClusterIssuer
  commonName: {{ .Values.ingress.host | quote }}
  dnsNames:
    - {{ .Values.ingress.host | quote }}
  duration: {{ .Values.certManager.certificate.duration }}
  renewBefore: {{ .Values.certManager.certificate.renewBefore }}
{{- end }}
