<!DOCTYPE HTML>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>J316 · Zeilensteuerung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <style>
    :root {
      --bg: #f4f7fb;
      --card-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
    }

    body {
      background: radial-gradient(circle at top right, #e6f7ff, transparent 40%), var(--bg);
      min-height: 100vh;
    }

    .app-shell {
      max-width: 1100px;
      margin: 2rem auto;
    }

    .panel {
      border: 0;
      border-radius: 1rem;
      box-shadow: var(--card-shadow);
    }

    .hero-chip {
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: #0d6efd;
      color: #fff;
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
      display: inline-block;
      margin-bottom: 0.75rem;
    }

    .status-dot {
      width: 0.65rem;
      height: 0.65rem;
      border-radius: 50%;
      background: #198754;
      box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, .18);
      display: inline-block;
      margin-right: 0.4rem;
    }

    .mock-display {
      border-radius: 0.9rem;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #67f3a5;
      font-family: "Courier New", Courier, monospace;
      padding: 1.2rem;
      min-height: 220px;
      border: 1px solid rgba(255,255,255,.08);
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .app-shell {
        margin: 1rem auto;
      }

      .mock-display {
        min-height: 160px;
      }
    }
  </style>
</head>
<body>
<main class="container app-shell">
          <div class="d-flex justify-content-end mb-3">
            <form th:action="@{/logout}" method="post">
              <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
          </div>
  <div class="row g-4 align-items-stretch">
    <section class="col-12 col-lg-7">
      <div class="card panel h-100">
        <div class="card-body p-4 p-md-5">
          <span class="hero-chip">J316 Control Center</span>
          <h1 class="h3 fw-bold mb-2">Zeilensteuerung der Choranzeige</h1>
          <p class="text-secondary mb-4">Bitte geben Sie den Text ein</p>

          <form th:action="@{/}" th:object="${cellOperation}" method="post" class="needs-validation" novalidate>
            <label for="sendValue" class="form-label fw-semibold">Anzeigetext</label>
            <div class="input-group input-group-lg mb-3">
              <span class="input-group-text">Text</span>
              <input id="sendValue" th:field="*{sendValue}" class="form-control" type="text"
                     placeholder="z. B. Probe beginnt um 19:30" maxlength="120" required>
            </div>

            <div class="d-grid gap-2 d-sm-flex">
              <button type="submit" name="action" class="btn btn-success btn-lg px-4" value="send">Senden</button>
              <button type="submit" name="action" class="btn btn-outline-secondary btn-lg px-4" value="clear">Leeren</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <section class="col-12 col-lg-5">
      <div class="card panel h-100">
        <div class="card-body p-4">
          <h2 class="h5 mb-3">Live-Monitor</h2>
          <div class="d-flex align-items-center mb-3 text-success fw-semibold">
            <span class="status-dot"></span>
            Verbindung aktiv
          </div>

          <div class="mock-display mb-3" th:text="${cellOperation.sendValue != null && !#strings.isEmpty(cellOperation.sendValue) ? cellOperation.sendValue : 'Warten auf Eingabe …'}">Warten auf Eingabe …</div>

          <div class="alert alert-primary mb-0" role="alert">
            <div class="fw-semibold">Server-Antwort</div>
            <div class="small" th:text="${result}">connected</div>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>
