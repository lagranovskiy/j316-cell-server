spring:
  profiles:
    active: production

  application:
    name: j316-cell

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:}

server:
  port: 8081
  servlet:
    session:
      timeout: 180m
      tracking-modes: cookie
      cookie:
        max-age: 360m
        name: chorzeile
        comment: session authentification for chorzeile

adapter:
  cell:
    ip: 192.168.0.248
    port: 5005
    connection.timeout: 1000

  security:
    username: ${BASIC_AUTH_USERNAME:test}
    password: ${BASIC_AUTH_PASSWORD:test}
    oauth2:
      enabled: ${OAUTH2_ENABLED:false}
