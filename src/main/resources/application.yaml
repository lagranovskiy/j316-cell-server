spring:
  profiles:
    active: production

  application:
    name: j316-cell

  security:
    oauth2:
      client:
        registration:
          auth0:
            provider: auth0
            client-id: ${AUTH0_CLIENT_ID:}
            client-secret: ${AUTH0_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email

        provider:
          auth0:
            issuer-uri: ${AUTH0_ISSUER_URI:https://christen-frankfurt/}

      resourceserver:
        jwt:
          issuer-uri: https://christen-frankfurt.eu.auth0.com/
server:
  port: 8081
  servlet:
    session:
      timeout: 180m
      tracking-modes: cookie
      cookie:
        max-age: 360m
        name: chorzeile

adapter:
  cell:
    ip: localhost
    port: 5005
    connection.timeout: 1000

  security:
    username: ${BASIC_AUTH_USERNAME:test}
    password: ${BASIC_AUTH_PASSWORD:test}
    auth0:
      enabled: ${AUTH0_ENABLED:true}
